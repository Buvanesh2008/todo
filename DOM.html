<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <h1 id="head" class="head">Buvanesh</h1>
    <div id="box">
        Hello
    </div>
</body>

<script>
    console.log(document.title)

    let a = document.getElementById("box") //selecting the tag with id box
    a.className = 'div' //adding class name to the tag whose id is box
    a.style.color = 'aqua'//adding styles to the box
    a.style.backgroundColor = 'black'
    a.innerHTML = '<p> hi hello</p>' //adding another tag inside the div tag

    let b = document.getElementsByTagName('h1')
    console.log(b[0])

    let c = document.querySelector('h1')
    console.log(c)

    let para = document.createElement('p')
    para.textContent = "Hi, I am Buvanesh"
    console.log(para)
    a.append(para)
    a.prepend(para)
    
</script>
</html>
