<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
</head>
<body>
    
</body>

<script>
    
    //alert, prompt and confirm are together called as modal window
    //without completing modal window we can't do anything in website
    //these modals stop executing js statements as they are executing

    alert("Hi")


    let input = prompt("Enter your age",'18')//18 is default argument
    console.log(input)


    let Input = confirm(`Is your age ${input}`)//asks for confirmation
    console.log(Input)

</script>
</html>
