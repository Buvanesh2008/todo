<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO</title>
</head>
<body>
    <h1>TO DO LIST</h1>
     <div>
        <input id="input-box" type="text">
        <button id="add">ADD</button>
    </div>

    <ul id="todoList"></ul>
    <h2>COMPLETED</h2>
    <ul id="doneList"></ul>
   
</body>

<script>
    let addBtn = document.getElementById("add");
    let task = document.getElementById("input-box");
    let list = new Array();
    let todoList = document.getElementById("todoList");
    let completedTask = document.getElementById("doneList");

    addBtn.addEventListener('click', (event) => {
        if(task.value.trim() !== ''){
            list.push(task.value);
            
            let index = list.length - 1;

            todoList.innerHTML += '<li id="item-' + index + '">' 
                + task.value 
                + ' <button onclick="deleteTask(' + index + ')">DELETE</button>'
                + ' <button onclick="markCompleted(' + index + ')">COMPLETED</button>'
                + '</li>';

            task.value = "";
        }
        else{
            alert("Enter a valid input!!");
        }
    });

    function markCompleted(id) {
        // Remove the item from the active UI list
        let item = document.getElementById("item-" + id);
        if(item) item.remove();

        completedTask.innerHTML += "<li>" + list[id] + "</li>";
    }

    function deleteTask(id) {
        let item = document.getElementById("item-" + id);
        if(item) item.remove();
    }
</script>
</html>
