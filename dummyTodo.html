<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO</title>
</head>
<body>
    <h1>TO DO LIST</h1>
     <div>
        <input id="input-box" type="text">
        <button id="add">ADD</button>
    </div>

    <ul id="todoList"></ul>
    <h2>COMPLETED</h2>
    <ul id="doneList"></ul>
   
</body>

<script>
    let addBtn = document.getElementById("add");

    let task = document.getElementById("input-box")

    let list = new Array();
    
    let todoList = document.getElementById("todoList")

    let completedTask = document.getElementById("doneList")

    addBtn.addEventListener('click', (event) =>{
        if(task.value != ''){
            list.push(task.value);

            let index = (list.length)-1;

            todoList.innerHTML += "<li id='"+index+"'>"+task.value+'</li>'
            +'<button class="delete" onclick="Delete('+ index +')">DELETE</button>'
            +'<button class="completed" onclick="markCompleted('+index+')">COMPLETED</button>'
            task.value = ""
            console.log(list)
        }
        else{
            alert("Enter a valid input!!")
        }


    })

    function markCompleted(id){
        completedTask.innerHTML += "<li>"+ list[id]+"</li>"
    }
</script>
</html>
