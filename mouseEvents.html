<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="sj">Hi</button>
</body>

<script>
    let btn = document.getElementById('sj')
    btn.addEventListener('click',(event)=>{btn.textContent = "Hello"})

    btn.addEventListener('mouseover',(event)=>{btn.textContent = "Hover"})

    btn.addEventListener('mouseout',(event)=>{btn.textContent = "Hi"})

</script>
</html>
